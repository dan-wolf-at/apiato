name: "Static analysis - PHPStan"

on:
  push:
    branches: [ master, '*.x' ]
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: PHPStan Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Composer token
        run: composer config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}

      - name: Copy environment file for Composer
        run: cp .env.ci .env

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist

      - name: Prepare PHPStan cache directory
        run: mkdir -p phpstan_cache

      - name: Restore PHPStan result cache
        uses: actions/cache/restore@v4
        with:
          path: phpstan_cache
          key: ${{ runner.OS }}-${{ github.repository }}-phpstan-result-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.OS }}-${{ github.repository }}-phpstan-result-cache-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --ansi --error-format=github

      - name: Generate Baseline in CI Context
        if: always()
        run: |
          echo "Attempting to generate PHPStan baseline as phpstan-baseline-from-ci.neon..."
          vendor/bin/phpstan analyse --memory-limit=512M --generate-baseline=.artifacts/phpstan-baseline-from-ci.neon --allow-empty-baseline -vv || echo "PHPStan baseline generation finished with non-zero exit code (this is okay if errors were found)."
          echo "Contents of phpstan-baseline-from-ci.neon:"
          cat .artifacts/phpstan-baseline-from-ci.neon || echo "Could not cat phpstan-baseline-from-ci.neon"

      - name: Save PHPStan result cache
        uses: actions/cache/save@v4
        if: ${{ !cancelled() }}
        with:
          path: phpstan_cache
          key: phpstan-result-cache-${{ github.sha }}
