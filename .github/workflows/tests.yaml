name: "Test suite"

on:
  push:
    branches: [ master, '*.x' ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [ 8.2 ]
    name: PHP ${{ matrix.php }}
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, redis
          coverage: xdebug

      - name: Setup Composer token
        run: composer config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}

      - name: Cache PHPUnit results
        uses: actions/cache@v4
        with:
          path: .phpunit.result.cache
          key: ${{ runner.os }}-php-${{ matrix.php }}-phpunit-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-phpunit-

      # If you encounter an error during Laravel package discovery, remember this:
      # Composer doesn't have access to env variables at this stage,
      # Therefore, it uses the default value for all env variables.
      # To fix this, we need to copy the .env.ci file to .env before running composer install.
      - name: Copy environment file for Composer
        run: cp .env.ci .env

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute tests
        run: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-clover=coverage.xml --testdox --cache-directory=.phpunit.result.cache --colors=always

#      - name: Upload coverage reports to Codecov
